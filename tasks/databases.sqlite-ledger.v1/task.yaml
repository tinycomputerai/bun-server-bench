id: databases.sqlite-ledger.v1
spec_version: 0.1.0
task_version: 1.0.0
title: SQLite money ledger with transactional transfers
description: >-
  Build a Bun service that keeps a money ledger in SQLite. Accounts hold integer
  balances and transfers move money atomically inside a single transaction,
  preserving conservation of total balance, never allowing a negative balance,
  and applying no partial change on failure. State survives a process restart.
difficulty:
  level: 4
  rationale: >-
    Requires durable SQLite persistence, an atomic read-check-debit-credit inside
    one transaction, correct rejection of insufficient funds with zero side
    effects, and invariants (conservation, non-negativity) that hold even under
    concurrent transfers from the same account.
  expected_code_size:
    min_lines: 120
    max_lines: 400
  expected_concepts:
    - sqlite persistence
    - transactional updates
    - balance invariants
    - atomic money movement
    - input validation
category: databases
tags:
  - databases
  - bun
  - sqlite
  - transactions
  - invariants
dataset:
  split: dev
  leakage_group: databases.sqlite-ledger
  trainable: true
curriculum:
  skill_atoms:
    - sqlite-schema
    - sqlite-transaction
    - balance-invariant
    - input-validation
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Build a SQLite-backed money ledger with atomic, invariant-preserving transfers.
  constraints:
    - The service must listen on the port provided by PORT.
    - Persist accounts and transfers in SQLite at DATABASE_PATH, defaulting to ./data/app.db.
    - Data must survive a process restart.
    - Move money inside a single SQLite transaction so failures apply no partial change.
  allowed_assumptions:
    - The process starts from the task root.
    - bun:sqlite is available; no external database server is required.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not store state only in memory.
success_criteria:
  must:
    - POST /accounts creates an account with the given (or zero) balance.
    - A valid transfer debits the source and credits the destination by the same amount.
    - The sum of all account balances is conserved across transfers.
    - Accounts and balances survive a process restart.
  must_not:
    - Allow any balance to become negative.
    - Apply a partial change when a transfer fails.
    - Let two concurrent transfers from one account overdraw it.
  edge_cases:
    - Insufficient funds returns 422 insufficient_funds with no balance change.
    - from == to returns 400 same_account.
    - Unknown account returns 404 account_not_found.
    - Non-positive or non-integer amount returns 422.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional:
      DATABASE_PATH: ./data/app.db
  services:
    - name: sqlite
      mode: file
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /accounts/0
      expected_status: 404
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: POST
        path: /accounts
      - method: GET
        path: /accounts/{id}
      - method: POST
        path: /transfers
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/ledger.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/ledger-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Validate JSON body shape before using values.
    - Do not expose stack traces.
    - Use a transaction so a failed transfer applies no partial change.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: SQLite-backed ledger using a single transaction for debit/credit with a non-negative balance check.
known_failure_modes:
  - In-memory storage loses accounts and balances across restart.
  - Debiting and crediting outside a transaction leaves a partial change when the credit step fails.
  - Checking the balance before the transaction lets concurrent transfers both overdraw the source.
  - Treating amount as a number without an integer/positivity check allows fractional or non-positive transfers.
