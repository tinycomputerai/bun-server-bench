id: authentication.jwt-verify.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Manual HS256 JWT verification with algorithm pinning
description: >-
  Build a Bun service that verifies HS256 JSON Web Tokens by hand using
  node:crypto and defends against algorithm-confusion attacks by pinning the
  accepted algorithm to HS256, rejecting alg:none and alg:HS512 tokens.
difficulty:
  level: 4
  rationale: >-
    Requires manual base64url decoding, HMAC-SHA256 signature recomputation, a
    constant-time comparison, ordered validation, and the alg-confusion defense
    that pins the algorithm before any signature handling.
  expected_code_size:
    min_lines: 100
    max_lines: 300
  expected_concepts:
    - base64url decoding
    - hmac-sha256 signing
    - algorithm pinning
    - constant-time comparison
    - ordered token validation
category: authentication
tags:
  - authentication
  - bun
  - jwt
  - hmac
  - alg-confusion
dataset:
  split: train
  leakage_group: authentication.jwt-verify
  trainable: true
curriculum:
  skill_atoms:
    - base64url-decode
    - hmac-verify
    - alg-pinning
    - exp-validation
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Verify HS256 JWTs manually with node:crypto and pin the algorithm to HS256.
  constraints:
    - The service must listen on the port provided by PORT.
    - Use the signing secret from JWT_SECRET, defaulting to bun-server-bench-secret.
    - Verify HMAC-SHA256 over the base64url header.payload signing input.
    - Return JSON for every response.
  allowed_assumptions:
    - The process starts from the task root.
    - node:crypto is available; no JWT library is required.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not skip the algorithm check for tokens that present no signature.
success_criteria:
  must:
    - GET /me with a valid unexpired HS256 token returns 200 with the claims.
    - The alg field is pinned to HS256; any other value returns 401 invalid_alg.
    - A tampered payload yields 401 invalid_signature.
    - An expired token yields 401 expired.
  must_not:
    - Accept an alg:none token.
    - Accept an HS512 token even when signed with the same secret.
    - Treat a missing Bearer prefix as a valid token.
  edge_cases:
    - No Authorization header returns 401 missing_token.
    - A token without exactly three segments returns 401 malformed.
    - A valid signature but missing sub claim returns 401 malformed.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional:
      JWT_SECRET: bun-server-bench-secret
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /me
      expected_status: 401
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /me
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/me.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/me-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Pin the JWT algorithm to HS256 before any signature handling.
    - Use a constant-time comparison for signatures.
    - Do not expose stack traces.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Manual HS256 verifier with algorithm pinning and constant-time signature check.
known_failure_modes:
  - Accepting alg:none tokens by skipping signature verification when no signature is present.
  - Accepting HS512 (or any non-HS256) tokens, enabling algorithm confusion.
  - Trusting the decoded payload after re-encoding without recomputing the signature.
  - Using a non-constant-time string comparison for the signature.
