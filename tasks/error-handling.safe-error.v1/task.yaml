id: error-handling.safe-error.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Safe JSON error responses
description: Build a Bun service that returns stable JSON errors without leaking stack traces.
difficulty:
  level: 1
  rationale: Requires explicit error routes and stable JSON response shapes.
  expected_code_size:
    min_lines: 25
    max_lines: 140
  expected_concepts:
    - error handling
    - status codes
    - JSON responses
category: error-handling
tags:
  - error-handling
  - bun
  - json
  - safe-errors
dataset:
  split: dev
  leakage_group: error-handling.safe-error
  trainable: true
curriculum:
  skill_atoms:
    - json-error-response
    - status-code-selection
    - stack-trace-avoidance
  small_model_suitability: high
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Implement safe JSON errors for /boom and unknown routes.
  constraints:
    - The service must listen on the port provided by PORT.
    - GET /boom returns HTTP 500 with a stable JSON error.
    - GET /health returns HTTP 200 with JSON.
    - Unsupported routes return HTTP 404 with JSON.
  allowed_assumptions:
    - The process starts from the task root.
    - No persistence is required.
  disallowed_shortcuts:
    - Do not expose stack traces.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
success_criteria:
  must:
    - GET /boom returns internal_error with HTTP 500.
    - GET /health returns ok true with HTTP 200.
    - Unknown routes return not_found with HTTP 404.
  must_not:
    - Include stack traces in response bodies.
    - Return plain text or HTML for API responses.
  edge_cases:
    - The 500 response body contains only the stable error shape.
    - Unknown routes return JSON.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /health
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /boom
      - method: GET
        path: /health
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/error.test.ts
    weight: 0.5
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/error-hidden.test.ts
    weight: 0.5
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 60
  start_seconds: 10
  readiness_seconds: 5
  test_seconds: 30
  total_seconds: 60
  idle_seconds: 10
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.8
    edge_cases: 0.1
    performance: 0.03
    security: 0.05
    maintainability: 0.02
  performance:
    metric: p95_latency_ms
    budget: 50
    floor: 5
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Do not expose stack traces.
    - Return JSON for success and error responses.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Uses stable JSON error bodies.
