id: websockets.presence-room.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Room presence and chat relay over WebSocket
description: >-
  Build a Bun WebSocket service that tracks live user presence in isolated
  rooms, relays chat to other members of the same room, and keeps an accurate
  roster as clients connect and disconnect with reliable cleanup.
difficulty:
  level: 4
  rationale: >-
    Requires stateful management of multiple WebSocket connections grouped by
    room, broadcasting presence updates to the right subset of sockets,
    enforcing strict room isolation, excluding the sender on chat fan-out, and
    removing users on disconnect with no leaked roster entries.
  expected_code_size:
    min_lines: 80
    max_lines: 300
  expected_concepts:
    - websocket server
    - connection grouping
    - presence broadcast
    - room isolation
    - disconnect cleanup
category: websockets
tags:
  - websockets
  - bun
  - presence
  - broadcast
  - room-isolation
dataset:
  split: dev
  leakage_group: websockets.presence-room
  trainable: true
curriculum:
  skill_atoms:
    - websocket-upgrade
    - connection-registry
    - presence-broadcast
    - disconnect-cleanup
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Build a WebSocket presence service with per-room rosters, chat relay, and disconnect cleanup.
  constraints:
    - The service must listen on the port provided by PORT.
    - Use Bun's native WebSocket server via Bun.serve.
    - Presence rosters must always list currently-connected users sorted ascending.
    - Rooms must be fully isolated from one another.
  allowed_assumptions:
    - The process starts from the task root.
    - State may be kept in memory; no persistence is required.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not echo a chat message back to its own sender.
success_criteria:
  must:
    - A joining socket receives a presence message listing all current room members sorted.
    - Other sockets in the room receive an updated presence message when a user joins.
    - GET /rooms/:room returns the current sorted roster for that room.
    - A chat message reaches other members of the same room only.
  must_not:
    - Deliver a message or presence update across different rooms.
    - Echo a chat message back to the sender.
    - Leave a disconnected user in the roster.
  edge_cases:
    - On disconnect remaining members receive presence without the departed user.
    - GET /rooms/:room on an empty or unknown room returns an empty users list.
    - Connecting without room or user does not upgrade and returns 400.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /healthz
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /healthz
      - method: GET
        path: /rooms/{room}
      - method: GET
        path: /ws
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/presence.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/presence-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Validate the JSON shape of incoming WebSocket messages before using them.
    - Do not expose stack traces.
    - Ignore malformed client messages instead of crashing.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: In-memory map of room to live socket set; presence broadcast on open and close, sender-excluded chat fan-out.
known_failure_modes:
  - Broadcasting presence or chat to all sockets regardless of room breaks isolation.
  - Echoing a chat message back to the sender violates the other-sockets-only rule.
  - Failing to remove a socket on close leaks a stale user in the roster.
  - Not sending the full roster to the joining socket leaves it without initial presence.
