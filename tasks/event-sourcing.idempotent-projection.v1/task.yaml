id: event-sourcing.idempotent-projection.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Idempotent event-sourced read-model projection
description: >-
  Build a Bun append-only event log with versioned events, incremental projection,
  out-of-order buffering, optimistic conflicts, quarantined poison events, and
  deterministic rebuild.
difficulty:
  level: 5
  rationale: >-
    Requires log-derived state, idempotent replay, gap buffering, version conflicts,
    poison quarantine, and rebuild determinism matching incremental apply.
  expected_code_size:
    min_lines: 120
    max_lines: 400
  expected_concepts:
    - event append log
    - versioned projection
    - idempotent replay
    - gap buffering
    - deterministic rebuild
category: databases
tags:
  - databases
  - bun
  - event-sourcing
  - projection
  - idempotency
dataset:
  split: train
  leakage_group: event-sourcing.idempotent-projection
  trainable: true
curriculum:
  skill_atoms:
    - event-append-log
    - versioned-projection
    - idempotent-replay
    - gap-buffering
    - projection-rebuild
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Maintain an idempotent projection from a versioned append-only event log.
  constraints:
    - The service must listen on the port provided by PORT.
    - Projection state must derive from the event log.
    - Return JSON for every response.
  allowed_assumptions:
    - The process starts from the task root.
    - State is held in process memory.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not mutate projection without appending to the log.
success_criteria:
  must:
    - POST /events appends versioned events and updates GET /projections/:id.
    - Duplicate identical events return 200 without double apply.
    - POST /projections/:id/rebuild reproduces incremental state.
  must_not:
    - Apply events past a version gap.
    - Apply quarantined unknown event types to the projection.
    - Accept conflicting payloads at the same version.
  edge_cases:
    - Out-of-order events buffer until the missing version arrives.
    - Oversized version gaps return 409 gap_not_allowed.
    - Rebuild state equals incremental state.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /healthz
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /healthz
      - method: POST
        path: /events
      - method: GET
        path: /projections/{aggregate_id}
      - method: POST
        path: /projections/{aggregate_id}/rebuild
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/projection.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/projection-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Do not expose stack traces.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Append-only log with per-aggregate locks, pending buffer, quarantine, and rebuild replay.
known_failure_modes:
  - Applying events in arrival order corrupts state on out-of-order delivery.
  - Rebuild diverges from incremental projection.
  - Poison events mutate the read model instead of being quarantined.
