id: databases.sqlite-migrations.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Idempotent ordered SQLite schema migrations
description: >-
  Build a Bun service that applies a fixed, ordered list of SQLite schema
  migrations exactly once on startup, tracked in a schema_migrations version
  table. Re-running on restart must not re-apply or error (a guarded ALTER), the
  version is reported over HTTP, and the resulting users data persists across
  restarts.
difficulty:
  level: 4
  rationale: >-
    Requires a durable version table, ordered one-time application of
    migrations including a non-idempotent ALTER that must be guarded so the
    second boot neither re-runs nor crashes, plus correct reporting and data
    persistence across restarts.
  expected_code_size:
    min_lines: 120
    max_lines: 400
  expected_concepts:
    - sqlite persistence
    - schema migrations
    - migration version table
    - idempotent boot
    - restart-safe schema evolution
category: databases
tags:
  - databases
  - bun
  - sqlite
  - migrations
  - idempotency
dataset:
  split: dev
  leakage_group: databases.sqlite-migrations
  trainable: true
curriculum:
  skill_atoms:
    - sqlite-schema
    - migration-tracking
    - idempotent-alter
    - input-validation
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Build a SQLite service that applies ordered migrations once, tracked in a version table.
  constraints:
    - The service must listen on the port provided by PORT.
    - Persist data in SQLite at DATABASE_PATH, defaulting to ./data/app.db.
    - Data and schema version must survive a process restart.
    - Apply each migration exactly once; never re-run a recorded migration.
  allowed_assumptions:
    - The process starts from the task root.
    - bun:sqlite is available; no external database server is required.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not store state only in memory.
success_criteria:
  must:
    - On boot the app applies the three migrations in order, recorded in schema_migrations.
    - GET /schema/version returns version 3 and the applied list in order.
    - POST /users persists a user with name and email.
    - Users and the migration version survive a process restart.
  must_not:
    - Re-apply a migration that is already recorded.
    - Crash on a later boot by re-running the ALTER.
    - Store schema state or user data only in memory.
  edge_cases:
    - A second and third boot keep version at 3 and do not re-run migrations.
    - Missing or non-string name/email returns 422.
    - Unknown user id returns 404.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional:
      DATABASE_PATH: ./data/app.db
  services:
    - name: sqlite
      mode: file
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /schema/version
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /schema/version
      - method: POST
        path: /users
      - method: GET
        path: /users/{id}
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/migrations.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/migrations-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Validate JSON body shape before using values.
    - Do not expose stack traces.
    - Guard migrations so a restart does not re-run a recorded migration.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: SQLite-backed service with a schema_migrations table guarding each ordered migration, including a one-time ALTER.
known_failure_modes:
  - An unconditional ALTER TABLE re-runs on the second boot and crashes with duplicate column.
  - In-memory schema tracking re-applies every migration on each restart.
  - Using CREATE TABLE IF NOT EXISTS hides drift but the ALTER still cannot be made idempotent without a version table.
  - Reporting a hard-coded version of 3 instead of counting recorded migrations.
