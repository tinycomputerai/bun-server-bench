id: websockets.backpressure-ordering.v1
spec_version: 0.1.0
task_version: 1.0.0
title: WebSocket backpressure and ordering
description: >-
  WebSocket backpressure and ordering. Each client receives messages in sequence order. Slow clients get gap markers without blocking fast clients. Per-client queues are bounded.
difficulty:
  level: 5
  rationale: >-
    Each client receives messages in sequence order.
  expected_code_size:
    min_lines: 120
    max_lines: 400
  expected_concepts:
    - per-client-queues
    - drop-oldest
    - gap-signaling
    - hol-isolation
category: websockets
tags:
  - websockets
  - bun
  - backpressure
  - ordering
  - broadcast
dataset:
  split: private_eval
  leakage_group: websockets.backpressure-ordering
  trainable: false
curriculum:
  skill_atoms:
    - per-client-queues
    - drop-oldest
    - gap-signaling
    - hol-isolation
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Broadcast sequenced topic messages with per-client backpressure and gap markers.
  constraints:
    - The service must listen on the port provided by PORT.
    - Return JSON for every HTTP response.
  allowed_assumptions:
    - The process starts from the task root.
    - State is held in process memory.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
success_criteria:
  must:
    - Each client receives messages in sequence order.
    - Slow clients get gap markers without blocking fast clients.
    - Per-client queues are bounded.
  must_not:
    - Expose stack traces in HTTP responses.
  edge_cases:
    - Hidden tests cover concurrency, failure injection, and security edge cases.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /healthz
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /healthz
      - method: POST
        path: /publish
      - method: GET
        path: /ws
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/backpressure.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/backpressure-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 180
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 200
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Do not expose stack traces.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Reference implementation for validation.
known_failure_modes:
  - Unbounded buffers OOM on slow consumers.
  - Awaiting each client send causes head-of-line blocking.
