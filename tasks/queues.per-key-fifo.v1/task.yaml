id: queues.per-key-fifo.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Per-key FIFO queue with concurrent workers
description: >-
  Build a Bun work queue with strict FIFO ordering per partition key, concurrent
  processing across keys, per-key worker exclusivity, ordered retry, and
  backpressure when a key backlog grows too large.
difficulty:
  level: 5
  rationale: >-
    Requires per-key ordering with cross-key concurrency, lease-style exclusivity,
    retry position preservation, idempotent redelivery, and backpressure.
  expected_code_size:
    min_lines: 120
    max_lines: 400
  expected_concepts:
    - per-key fifo
    - worker pool
    - key exclusivity
    - ordered retry
    - backpressure
category: background-jobs
tags:
  - background-jobs
  - bun
  - queues
  - fifo
  - concurrency
dataset:
  split: dev
  leakage_group: queues.per-key-fifo
  trainable: true
curriculum:
  skill_atoms:
    - per-key-ordering
    - worker-pool-concurrency
    - key-exclusivity
    - ordered-retry
    - queue-backpressure
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Process enqueued work in per-key FIFO order with concurrent workers.
  constraints:
    - The service must listen on the port provided by PORT.
    - Run four background workers automatically.
    - Return JSON for every response.
  allowed_assumptions:
    - The process starts from the task root.
    - State is held in process memory.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not use a single worker for all keys.
success_criteria:
  must:
    - POST /enqueue accepts work and GET /processed shows per-key FIFO order.
    - Different keys make progress concurrently.
    - GET /status exposes at most one in-flight job per key.
  must_not:
    - Reorder same-key jobs under concurrency.
    - Process the same key on two workers simultaneously.
    - Process synchronously inside POST /enqueue.
  edge_cases:
    - fail-once payloads retry at the front without jumping later same-key jobs.
    - crash payloads redeliver idempotently with one processed entry.
    - Per-key depth 50 triggers 429 backpressure.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /healthz
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /healthz
      - method: POST
        path: /enqueue
      - method: GET
        path: /processed
      - method: GET
        path: /status
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/queue.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/queue-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 180
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 200
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Do not expose stack traces.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Four-worker pool with per-key queues, busy-key exclusivity, and front requeue on failure.
known_failure_modes:
  - Global FIFO or single worker removes cross-key concurrency.
  - Unordered concurrent processing reorders same-key jobs.
  - Retry pushes failed jobs behind later same-key work.
