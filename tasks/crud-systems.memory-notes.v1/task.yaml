id: crud-systems.memory-notes.v1
spec_version: 0.1.0
task_version: 1.0.0
title: In-memory notes CRUD API
description: Build a small Bun API that creates notes in memory and lists them in insertion order.
difficulty:
  level: 2
  rationale: Requires multiple endpoints, mutable state, validation, and stable id generation.
  expected_code_size:
    min_lines: 60
    max_lines: 260
  expected_concepts:
    - in-memory persistence
    - CRUD routing
    - JSON validation
category: crud-systems
tags:
  - crud-systems
  - bun
  - json
  - notes
dataset:
  split: dev
  leakage_group: crud-systems.memory-notes
  trainable: true
curriculum:
  skill_atoms:
    - in-memory-state
    - json-body-parsing
    - list-endpoint
    - create-endpoint
  small_model_suitability: medium
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Implement POST /notes and GET /notes with in-memory state.
  constraints:
    - The service must listen on the port provided by PORT.
    - POST /notes creates a note with a non-empty text field.
    - GET /notes returns all notes in insertion order.
    - Invalid note text returns HTTP 422 with JSON.
  allowed_assumptions:
    - The process starts from the task root.
    - Notes only need to persist for the process lifetime.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
success_criteria:
  must:
    - POST /notes returns HTTP 201 with id and text.
    - GET /notes returns notes in insertion order.
    - Note ids increment from note_1.
  must_not:
    - Accept missing or blank text.
    - Return plain text or HTML for API responses.
  edge_cases:
    - Blank text returns invalid_text.
    - Multiple notes keep insertion order.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /notes
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: POST
        path: /notes
      - method: GET
        path: /notes
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/notes.test.ts
    weight: 0.5
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/notes-hidden.test.ts
    weight: 0.5
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 60
  start_seconds: 10
  readiness_seconds: 5
  test_seconds: 30
  total_seconds: 60
  idle_seconds: 10
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.8
    edge_cases: 0.1
    performance: 0.03
    security: 0.05
    maintainability: 0.02
  performance:
    metric: p95_latency_ms
    budget: 50
    floor: 5
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Validate JSON before using values.
    - Return JSON for success and error responses.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Uses native Bun.serve with an in-memory notes array.
