id: databases.online-migration-backfill.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Online migration with dual-write and backfill
description: >-
  Build a Bun service that migrates records through dual-write, resumable
  backfill with skip-if-newer concurrency safety, gated cutover, and rollback
  without data loss.
difficulty:
  level: 5
  rationale: >-
    Requires phased migration choreography, dual-write/read consistency, idempotent
    resumable backfill, cutover gating, and rollback safety under concurrent writes.
  expected_code_size:
    min_lines: 120
    max_lines: 400
  expected_concepts:
    - dual-write migration
    - resumable backfill
    - skip-if-newer
    - cutover gating
    - rollback
category: databases
tags:
  - databases
  - bun
  - migration
  - backfill
  - dual-write
dataset:
  split: dev
  leakage_group: databases.online-migration-backfill
  trainable: true
curriculum:
  skill_atoms:
    - migration-phases
    - dual-write-read
    - resumable-backfill
    - concurrent-write-safety
    - migration-rollback
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Migrate records online with dual-write, backfill, cutover, and rollback.
  constraints:
    - The service must listen on the port provided by PORT.
    - normalized_value equals legacy_value times two.
    - Return JSON for every response.
  allowed_assumptions:
    - The process starts from the task root.
    - State is held in process memory.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not cut over before backfill completes.
success_criteria:
  must:
    - POST /migration/start enters dual_write and keeps endpoints available.
    - POST /migration/backfill is resumable and reports backfill_complete.
    - POST /migration/cutover succeeds only after backfill completes.
  must_not:
    - Clobber rows updated concurrently during backfill.
    - Lose legacy data on rollback.
  edge_cases:
    - PATCH during backfill preserves the newer normalized value.
    - Rollback clears normalized fields and restores legacy reads.
    - Premature cutover returns 409.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /healthz
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /healthz
      - method: POST
        path: /records
      - method: GET
        path: /records/{id}
      - method: PATCH
        path: /records/{id}
      - method: GET
        path: /migration/status
      - method: POST
        path: /migration/start
      - method: POST
        path: /migration/backfill
      - method: POST
        path: /migration/cutover
      - method: POST
        path: /migration/rollback
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/migration.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/migration-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Do not expose stack traces.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Phased dual-write with versioned skip-if-newer backfill, gated cutover, and rollback.
known_failure_modes:
  - Backfill overwrites concurrent writes (lost update).
  - Cutover before backfill completes serves inconsistent reads.
  - Rollback drops dual-written legacy values.
