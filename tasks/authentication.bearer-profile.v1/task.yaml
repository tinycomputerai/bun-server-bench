id: authentication.bearer-profile.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Bearer token profile endpoint
description: Build a Bun HTTP endpoint that returns a profile only when the request includes the expected bearer token.
difficulty:
  level: 1
  rationale: Requires one authenticated endpoint and stable unauthorized responses.
  expected_code_size:
    min_lines: 30
    max_lines: 160
  expected_concepts:
    - bearer token parsing
    - authorization header handling
    - JSON error responses
category: authentication
tags:
  - authentication
  - bun
  - bearer-token
  - json
dataset:
  split: dev
  leakage_group: authentication.bearer-profile
  trainable: true
curriculum:
  skill_atoms:
    - authorization-header
    - bearer-token-check
    - unauthorized-response
  small_model_suitability: high
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Implement GET /profile guarded by a bearer token.
  constraints:
    - The service must listen on the port provided by PORT.
    - 'Authorization: Bearer benchmark-token grants access.'
    - Missing or invalid tokens return HTTP 401 with JSON.
    - Successful responses return HTTP 200 with a profile JSON body.
  allowed_assumptions:
    - The process starts from the task root.
    - The only valid token is benchmark-token.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test names.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
success_criteria:
  must:
    - GET /profile returns HTTP 200 with a valid bearer token.
    - Successful responses return id and email.
    - Missing or invalid tokens return HTTP 401 with JSON.
  must_not:
    - Accept malformed authorization headers.
    - Return plain text or HTML for API responses.
  edge_cases:
    - Missing Authorization returns unauthorized.
    - Wrong bearer token returns unauthorized.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /profile
      expected_status: 401
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /profile
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/profile.test.ts
    weight: 0.5
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/profile-hidden.test.ts
    weight: 0.5
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 60
  start_seconds: 10
  readiness_seconds: 5
  test_seconds: 30
  total_seconds: 60
  idle_seconds: 10
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.8
    edge_cases: 0.1
    performance: 0.03
    security: 0.05
    maintainability: 0.02
  performance:
    metric: p95_latency_ms
    budget: 50
    floor: 5
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Validate authorization headers before returning profile data.
    - Return JSON for success and error responses.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Uses native Bun.serve with a fixed bearer token check.
