id: http.conditional-cache-semantics.v1
spec_version: 0.1.0
task_version: 1.0.0
title: HTTP conditional cache and Vary-aware caching
description: >-
  Build a Bun HTTP origin with strong ETags, conditional GET 304 handling,
  strong If-Match on PUT, and a Vary-aware intermediary cache keyed on
  Accept-Encoding.
difficulty:
  level: 4
  rationale: >-
    Requires RFC-style validator comparison, 304 without body, ETag precedence
    over If-Modified-Since, strong If-Match on writes, and Vary-aware cache keys.
  expected_code_size:
    min_lines: 100
    max_lines: 350
  expected_concepts:
    - etag validators
    - conditional requests
    - vary cache keys
    - strong if-match
    - intermediary cache
category: http-apis
tags:
  - http-apis
  - bun
  - caching
  - etag
  - vary
dataset:
  split: private_eval
  leakage_group: http.conditional-cache-semantics
  trainable: false
curriculum:
  skill_atoms:
    - conditional-get-304
    - etag-weak-strong
    - vary-cache-key
    - if-match-precondition
    - cache-intermediary
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Implement origin conditional caching and a Vary-aware cached GET endpoint.
  constraints:
    - The service must listen on the port provided by PORT.
    - Honor ETag precedence over If-Modified-Since.
    - Return JSON errors only where specified; otherwise HTTP semantics apply.
  allowed_assumptions:
    - The process starts from the task root.
    - State is held in process memory.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not return a body with 304 responses.
success_criteria:
  must:
    - GET /resource returns ETag, Last-Modified, Cache-Control, and Vary.
    - Matching If-None-Match returns 304 without a body.
    - PUT /resource requires strong If-Match against identity ETag.
  must_not:
    - Serve the wrong Accept-Encoding variant from cache.
    - Accept weak If-Match on PUT.
  edge_cases:
    - If-Modified-Since alone can yield 304 when ETag header absent.
    - ETag wins when both conditional validators are present.
    - GET /cached/resource keys cache entries by Accept-Encoding.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /healthz
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: GET
        path: /healthz
      - method: GET
        path: /resource
      - method: PUT
        path: /resource
      - method: GET
        path: /cached/resource
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/cache.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/cache-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_SERVER_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Do not expose stack traces.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_SERVER_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: Origin with identity/gzip variants, weak INM compare, strong If-Match, Vary-keyed cache store.
known_failure_modes:
  - Always returning 200 and ignoring conditional headers.
  - Serving gzip variant to identity clients due to missing Vary keying.
  - Including a body on 304 responses.
