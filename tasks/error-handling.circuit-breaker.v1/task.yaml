id: error-handling.circuit-breaker.v1
spec_version: 0.1.0
task_version: 1.0.0
title: Resilient caller with retry semantics and a circuit breaker
description: >-
  Build a Bun service that calls an unreliable in-process dependency with
  HTTP-method-aware retry semantics (idempotent GET retries, non-idempotent POST
  does not) and guards the dependency with a circuit breaker that opens on
  consecutive failures, fails fast while open, and recovers through a half-open
  trial after a cooldown.
difficulty:
  level: 4
  rationale: >-
    Requires correct idempotent-vs-non-idempotent retry handling, a precise
    consecutive-failure counting model, and a closed/open/half_open state
    machine with fail-fast behavior and time-based cooldown recovery, all kept
    deterministic and free of off-by-one errors.
  expected_code_size:
    min_lines: 110
    max_lines: 350
  expected_concepts:
    - retry-with-backoff
    - idempotency
    - circuit-breaker-state-machine
    - fail-fast
    - cooldown-recovery
category: error-handling
tags:
  - error-handling
  - bun
  - retry
  - circuit-breaker
  - resilience
dataset:
  split: dev
  leakage_group: error-handling.circuit-breaker
  trainable: true
curriculum:
  skill_atoms:
    - retry-loop
    - idempotency-distinction
    - breaker-state-transitions
    - fail-fast-gate
  small_model_suitability: low
rollout_capture:
  enabled: true
benchmarking:
  agent_metrics:
    - wall_time_ms
    - input_tokens
    - output_tokens
    - tool_calls
  app_metrics:
    - readiness_ms
    - p95_latency_ms
    - max_rss_mb
instruction:
  prompt_file: prompt.md
  summary: Build a resilient caller with method-aware retries and a circuit breaker.
  constraints:
    - The service must listen on the port provided by PORT.
    - All state is in memory; no persistence or external network is required.
    - Return JSON for every response.
  allowed_assumptions:
    - The process starts from the task root.
    - The downstream dependency is simulated in-process and controlled via POST /dependency.
  disallowed_shortcuts:
    - Do not hard-code behavior based on test values.
    - Do not read files under tests/hidden.
    - Do not modify test files or runner files.
    - Do not open outbound network sockets.
success_criteria:
  must:
    - GET /call retries up to 3 attempts and reports the succeeding attempt number.
    - POST /call invokes the dependency at most once with no retry.
    - Five consecutive failed calls open the breaker.
    - While open, a /call returns 503 without invoking the dependency.
    - After the cooldown a successful trial closes the breaker and resets failures.
  must_not:
    - Retry a non-idempotent POST /call.
    - Invoke the dependency while the breaker is open.
    - Count retry attempts as separate consecutive failures.
  edge_cases:
    - A failed GET /call increments dependency_calls by 3 but consecutive_failures by 1.
    - A failed half-open trial reopens the breaker and restarts the cooldown.
    - An invalid dependency mode returns 400 and leaves the current mode intact.
environment:
  runtime: bun
  bun_version: ">=1.1.0 <2.0.0"
  os: linux
  architecture: x86_64
  network: disabled
  filesystem:
    writable:
      - .
      - /tmp
    readonly:
      - tests
      - runner
  env:
    required:
      PORT: allocated by runner
    optional: {}
  services: []
interfaces:
  process:
    start_command: bun run start
    readiness:
      type: http
      path: /breaker
      expected_status: 200
  http:
    base_url_env: BASE_URL
    endpoints:
      - method: POST
        path: /dependency
      - method: GET
        path: /call
      - method: POST
        path: /call
      - method: GET
        path: /breaker
tests:
  public:
    command: bun test tests/public
    files:
      - tests/public/circuit-breaker.test.ts
    weight: 0.3
  hidden:
    command: bun test tests/hidden
    files:
      - tests/hidden/circuit-breaker-hidden.test.ts
    weight: 0.7
  mutation_policy:
    seed_env: BUN_BENCH_SEED
    deterministic: true
timeouts:
  install_seconds: 120
  start_seconds: 15
  readiness_seconds: 10
  test_seconds: 120
  total_seconds: 900
  idle_seconds: 30
scoring:
  max_score: 100
  gates:
    - name: installs
      requirement: install exits with status 0
      on_fail: zero
    - name: starts
      requirement: readiness check passes
      on_fail: zero
    - name: security_baseline
      requirement: no hidden test access or network egress
      on_fail: zero
  weights:
    correctness: 0.6
    edge_cases: 0.25
    performance: 0.05
    security: 0.05
    maintainability: 0.05
  performance:
    metric: p95_latency_ms
    budget: 80
    floor: 10
  dependency_budget:
    max_runtime_dependencies: 0
    penalty_per_extra_dependency: 1
security:
  sandbox:
    network_egress: denied
    filesystem_hidden_tests: denied
    process_spawn: restricted
  app_requirements:
    - Validate the dependency mode before applying it.
    - Do not expose stack traces.
    - Do not invoke the dependency while the breaker is open.
  forbidden_patterns:
    - reading tests/hidden
    - modifying runner files
    - opening outbound sockets
dependencies:
  package_manager: bun
  install_command: bun install --no-save
  allow_additional: false
  allowlist: []
  denylist: []
  network_during_install: denied
  network_during_tests: denied
artifacts:
  required:
    - result.json
    - junit.xml
    - logs/stdout.log
    - logs/stderr.log
    - metrics.json
  optional:
    - coverage/lcov.info
provenance:
  source: authored
  authors:
    - tinycomputer.ai
  created_at: "2026-06-16T00:00:00Z"
  license: Apache-2.0
reference_solution:
  visibility: private
  path: solutions/reference
  validation_command: BUN_BENCH_APP_DIR=solutions/reference bun test tests/public tests/hidden
  expected_score: 100
  notes: In-memory breaker with per-request failure counting and a half-open cooldown trial.
known_failure_modes:
  - Retrying a non-idempotent POST /call, causing duplicate dependency invocations.
  - Counting each failed retry attempt as a separate consecutive failure, opening the breaker too early.
  - Invoking the dependency while the breaker is open instead of failing fast.
  - Permanently closing the breaker on cooldown instead of allowing a single half-open trial.
  - Not resetting the consecutive-failure count after a successful call.
