name: Sync Harbor exports

on:
  push:
    branches:
      - main
    paths:
      - "tasks/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-harbor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tasks
        run: bun run validate

      - name: Sync harbor exports from tasks lock
        run: bun run harbor:sync --tasks 'tasks/**' --changed-since "${{ github.event.before }}"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.TINYCOMPUTER_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.TINYCOMPUTER_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Commit and push harbor exports
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "tinycomputerai"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add harbor/
          if git diff --staged --quiet; then
            echo "Harbor exports are already up to date."
            exit 0
          fi
          git commit \
            -m "chore(tasks): sync exports from tasks" \
            -m "Auto-generated by the Sync Harbor workflow on tasks/ changes."
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
