name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release version to create (example: 0.1.0; do not include v)"
        required: true
        type: string
      dry_run:
        description: "Validate and build only; do not publish"
        required: true
        type: boolean
        default: true
      publish_harbor:
        description: "Publish Harbor Hub packages"
        required: true
        type: boolean
        default: true
      publish_huggingface:
        description: "Publish Hugging Face dataset"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.tag }}
      RELEASE_TAG: v${{ github.event.inputs.tag }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require branch dispatch
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "branch" ]]; then
            echo "Release workflow must be run from a branch, not ${GITHUB_REF_TYPE}."
            exit 1
          fi

      - name: Validate release version
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must use X.Y.Z format (example: 0.1.0). Do not include a leading v."
            exit 1
          fi

      - name: Setup tinycomputer app
        id: setup-releaser-app
        uses: ./.github/actions/setup-releaser-app
        with:
          client-id: ${{ vars.TINYCOMPUTER_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.TINYCOMPUTER_GITHUB_APP_PRIVATE_KEY }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Hugging Face CLI
        run: python -m pip install --quiet huggingface_hub

      - name: Fetch staged release assets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bun run release:fetch-staging -- --tag "${RELEASE_VERSION}"

      - name: Validate benchmark
        run: bun run validate

      - name: Run tests
        run: bun run test

      - name: Verify release assets
        run: bun run release:verify -- --tag "${RELEASE_VERSION}" --datasets-only

      - name: Build release artifacts
        run: bun run release:build -- --tag "${RELEASE_VERSION}"

      - name: Verify release artifacts
        run: bun run release:verify -- --tag "${RELEASE_VERSION}"

      - name: Create and push release tag
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ steps.setup-releaser-app.outputs.token }}
        run: |
          VERSION="${RELEASE_VERSION}"
          if [ "${DRY_RUN}" = "true" ]; then
            bun run release:github:dry-run -- "${VERSION}"
          else
            bun run release:github -- "${VERSION}"
          fi

      - name: Publish Harbor Hub packages
        if: github.event.inputs.publish_harbor == 'true'
        env:
          HARBOR_TOKEN: ${{ secrets.HARBOR_TOKEN }}
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            bun run release:harbor -- --tag "${RELEASE_VERSION}" --dry-run
          else
            bun run release:harbor -- --tag "${RELEASE_VERSION}"
          fi

      - name: Publish Hugging Face dataset
        if: github.event.inputs.publish_huggingface == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            bun run release:huggingface -- --tag "${RELEASE_VERSION}" --dry-run
          else
            bun run release:huggingface -- --tag "${RELEASE_VERSION}"
          fi
