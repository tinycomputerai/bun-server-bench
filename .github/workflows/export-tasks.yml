name: export-tasks

on:
  push:
    branches:
      - main
    paths:
      - "tasks/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-harbor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history so `harbor:sync --changed-since <before>` can diff
          # against the pushed-from commit.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup tinycomputer app
        uses: ./.github/actions/setup-releaser-app
        with:
          client-id: ${{ vars.TINYCOMPUTER_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.TINYCOMPUTER_GITHUB_APP_PRIVATE_KEY }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tasks
        run: bun run validate

      - name: Sync harbor exports from tasks lock
        env:
          # Empty on workflow_dispatch; an all-zero SHA forces a full re-sync.
          CHANGED_SINCE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          bun run harbor:sync --tasks 'tasks/**' \
            --changed-since "${CHANGED_SINCE:-0000000000000000000000000000000000000000}"

      - name: Commit and push harbor exports
        run: |
          set -euo pipefail
          git add harbor/
          if git diff --staged --quiet; then
            echo "Harbor exports are already up to date."
            exit 0
          fi
          git commit \
            -m "chore(tasks): sync exports from tasks" \
            -m "Auto-generated by the Sync Harbor workflow on tasks/ changes."
          git push origin HEAD:main
